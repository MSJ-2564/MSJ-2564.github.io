<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministerios Sol de Justicia</title>
<style>
:root {
--primary-bg: #071330;
--secondary-gold: #c5a059;
--white-text: #ffffff;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
margin: 0;
padding: 0;
background-color: var(--primary-bg);
color: var(--white-text);
}
header {
display: flex;
justify-content: space-between;
align-items: center;
background-color: #040916;
padding: 20px 50px;
border-bottom: 4px solid var(--secondary-gold);
}
.logo-container {
display: flex;
align-items: center;
font-size: 24px;
font-weight: bold;
}
.logo-img {
max-width: 50px;
height: auto;
margin-right: 15px;
}
.logo-text-ministerios {
color: var(--white-text);
}
.logo-text-gold {
color: var(--secondary-gold);
}
nav {
display: flex;
align-items: center;
}
.nav-links {
list-style: none;
display: flex;
margin: 0;
padding: 0;
}
.nav-links li {
margin-left: 30px;
}
.nav-links a {
color: var(--white-text);
text-decoration: none;
font-size: 16px;
transition: color 0.3s;
}
.nav-links a:hover, .nav-links a.active {
color: var(--secondary-gold);
font-weight: bold;
}
.menu-toggle {
display: none;
flex-direction: column;
cursor: pointer;
}
.menu-toggle span {
height: 3px;
width: 25px;
background: var(--secondary-gold);
margin-bottom: 4px;
border-radius: 4px;
}
main {
padding: 50px;
text-align: center;
}
h1 {
color: var(--secondary-gold);
margin-bottom: 10px;
}
@media (max-width: 768px) {
.nav-links {
display: none;
flex-direction: column;
position: absolute;
top: 76px;
right: 0;
background-color: #040916;
width: 100%;
text-align: center;
border-bottom: 4px solid var(--secondary-gold);
padding-bottom: 20px;
}
.nav-links.active {
display: flex;
}
.nav-links li {
margin: 15px 0 0;
}
.menu-toggle {
display: flex;
}
}
</style>
</head>
<body>
<header>
<div class="logo-container">
<!-- Inserta aquí la ruta de tu imagen de logo -->
<img src="tu-logo.png" alt="Logo" class="logo-img">
<div>
<span class="logo-text-ministerios">Ministerios</span>
<span class="logo-text-gold">Sol de Justicia</span>
</div>
</div>
<div class="menu-toggle" id="mobile-menu">
<span></span>
<span></span>
<span></span>
</div>
<nav>
<ul class="nav-links" id="nav-list">
<li><a href="#" class="active">Inicio</a></li>
<li><a href="#">Conócenos</a></li>
<li><a href="#">Instituto Bíblico</a></li>
<li><a href="#">Galería</a></li>
<li><a href="#">Contacto</a></li>
</ul>
</nav>
</header>
<main>
<h1>Bienvenidos a Nuestro Sitio</h1>
<p>Una página dedicada a Malaquías 4:2.</p>
</main>
<script>
const mobileMenu = document.getElementById('mobile-menu');
const navList = document.getElementById('nav-list');
mobileMenu.addEventListener('click', () => {
navList.classList.toggle('active');
});
</script>
</body>
</html>
