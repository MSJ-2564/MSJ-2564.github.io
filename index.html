<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministerios Sol de Justicia</title>
    <style>
        :root {
            --azul-fondo: #0a192f;
            --azul-secundario: #0c233a;
            --azul-oscuro: #07101e;
            --dorado-brillante: #d4af37;
            --blanco: #ffffff;
            --gris-claro: #ccd6f6;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--azul-fondo);
            color: var(--blanco);
            scroll-behavior: smooth;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: var(--azul-oscuro);
            border-bottom: 2px solid var(--dorado-brillante);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 50px;
            margin-right: 15px;
        }

        .logo h1 {
            font-size: 20px;
            margin: 0;
            color: var(--blanco);
        }

        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        nav ul li {
            margin-left: 20px;
        }

        nav ul li a {
            color: var(--blanco);
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: var(--dorado-brillante);
        }

        nav ul li a.destacado {
            background-color: var(--dorado-brillante);
            color: var(--azul-fondo);
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        nav ul li a.destacado:hover {
            background-color: #f1c40f;
            color: var(--azul-fondo);
        }

        @keyframes subirLento {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        main {
            margin-top: 90px; /* Evita que el header fijo tape el contenido */
        }

        #inicio {
            text-align: center;
            padding: 100px 20px;
            position: relative;
            overflow: hidden;
            animation: subirLento 2s ease-out;
        }

        .fondo-transparente {
            position: absolute;
            top: 5%;
            right: 15%;
            width: 300px;
            height: auto;
            opacity: 0.08;
            z-index: 1;
            pointer-events: none;
        }

        .contenido-inicio {
            position: relative;
            z-index: 5;
        }

        #inicio h2 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        #inicio .sol-de-justicia {
            font-family: 'Great Vibes', 'Brush Script MT', cursive;
            color: var(--dorado-brillante);
            font-size: 64px;
            display: block;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #inicio p {
            max-width: 800px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
            font-size: 18px;
            color: var(--gris-claro);
        }

        .btn-principal {
            background-color: var(--dorado-brillante);
            color: var(--azul-fondo);
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 50px;
            transition: transform 0.2s;
        }

        .btn-principal:hover {
            transform: scale(1.05);
        }

        .botones-ubicacion {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-secundario {
            background-color: transparent;
            border: 2px solid var(--dorado-brillante);
            color: var(--blanco);
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-secundario:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }

        /* Secciones Comunes */
        .seccion {
            padding: 80px 40px;
        }

        .seccion-alt {
            background-color: var(--azul-secundario);
        }

        /* Sección Misión / Conócenos */
        .seccion-mision {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .texto-mision {
            max-width: 600px;
        }

            color: var(--dorado-brillante);
            font-size: 32px;
            margin
