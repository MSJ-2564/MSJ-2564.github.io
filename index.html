<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministerio de Justicia</title>
<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
margin: 0;
padding: 0;
background-color: #f4f6f8;
color: #333;
}
header {
background-color: #1a252f;
color: #fff;
padding: 20px 0;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
nav {
display: flex;
justify-content: space-between;
align-items: center;
max-width: 1200px;

nav ul {

padding: 0;
}
nav ul li {

nav ul li:hover {

<body>
<header>
<nav>
<img src="logo.png" alt="Logo">
<ul>
<li>Inicio</li>
<li>Conócenos</li>
</ul>
</nav>
</header>
<main>
<h2>Ministerio de Justicia</h2>
<h2>Página Malaquías 4:2</h2>
